<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аптека Вита Ботаника — наличие товара</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    max-width: 800px; margin: 0 auto; padding: 16px;
    background: #f5f7fa; color: #222;
  }
  .header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .header img { height: 52px; width: auto; }
  h1 { font-size: 20px; margin: 0; color: #1a7f37; }
  .upd { color: #888; font-size: 13px; margin-bottom: 16px; }
  #search {
    width: 100%; padding: 14px 16px; font-size: 17px;
    border: 2px solid #cfd8e3; border-radius: 10px; outline: none;
  }
  #search:focus { border-color: #2d7ff9; }
  .count { color: #888; font-size: 13px; margin: 12px 2px; }
  .item {
    display: flex; justify-content: space-between; align-items: center;
    background: #fff; padding: 12px 14px; margin-bottom: 8px;
    border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .name { flex: 1; padding-right: 12px; }
  .qty {
    white-space: nowrap; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
  }
  .in { background: #e3f7e8; color: #1a7f37; }
  .out { background: #fdecec; color: #c0392b; }
  .empty { text-align: center; color: #999; padding: 30px; }
</style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="логотип" onerror="this.style.display='none'">
    <h1>Аптека «Вита Ботаника»</h1>
  </div>
  <div class="upd" id="upd">Загрузка данных…</div>

  <input id="search" type="text" placeholder="Введите название товара…" autocomplete="off">
  <div class="count" id="count"></div>
  <div id="results"></div>

<script>
let goods = [];

fetch('ostatki.txt')
  .then(r => r.arrayBuffer())
  .then(buf => {
    const text = new TextDecoder('windows-1251').decode(buf);
    goods = parse(text);
    document.getElementById('upd').textContent =
      'Товаров в наличии: ' + goods.filter(g => g.qty > 0).length;
    render('');
  })
  .catch(() => {
    document.getElementById('upd').textContent =
      '⚠ Не удалось загрузить ostatki.txt (см. инструкцию по запуску)';
  });

function parse(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    // Отделяем все числа в конце строки (остатки/движения)
    const nums = [];
    let m;
    // забираем числа справа налево
    while ((m = line.match(/\s+([\d]+[.,]\d+|\d+)$/)) !== null) {
      nums.unshift(m[1]);
      line = line.slice(0, m.index).trimEnd();
    }

    const name = line.trim();
    if (!name) continue;
    if (nums.length === 0) continue;                 // нет чисел → мусор
    if (name === 'Отдел / Товар') continue;          // заголовок
    if (name.indexOf('Остатки товаров') !== -1) continue;
    if (name.indexOf('По всем складам') !== -1) continue;
    if (name === 'Карамзина') continue;

    // конечный остаток = последнее число
    const last = nums[nums.length - 1];
    const num = parseFloat(last.replace(',', '.'));
    if (isNaN(num)) continue;

    result.push({ name: name, qty: num });
  }
  return result;
}
