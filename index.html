<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аптека Вита Ботаника — наличие товара</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  max-width: 800px; margin: 0 auto; padding: 16px;
  background: #f5f7fa; color: #222;
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.header img { height: 52px; width: auto; }
h1 { font-size: 20px; margin: 0; color: #1a7f37; }
.upd { color: #888; font-size: 13px; margin-bottom: 16px; }
#search {
  width: 100%; padding: 14px 16px; font-size: 17px;
  border: 2px solid #cfd8e3; border-radius: 10px; outline: none;
}
#search:focus { border-color: #2d7ff9; }
.count { color: #888; font-size: 13px; margin: 12px 2px; }
.item {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 12px 14px; margin-bottom: 8px;
  border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.name { flex: 1; padding-right: 12px; }
.qty { white-space: nowrap; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.in { background: #e3f7e8; color: #1a7f37; }
.out { background: #fdecec; color: #c0392b; }
.empty { text-align: center; color: #999; padding: 30px; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="logo" onerror="this.style.display='none'">
  <h1>Аптека «Вита Ботаника»</h1>
</div>
<div class="upd" id="upd">Загрузка данных…</div>

<input type="text" id="search" placeholder="🔍 Поиск товара…" oninput="render(this.value)">
<div class="count" id="count"></div>
<div id="list"></div>

<script>
let goods = [];

fetch('ostatki.txt?v=' + Date.now())
  .then(r => r.arrayBuffer())
  .then(buf => {
    const bytes = new Uint8Array(buf);
    // 1С v7.7 всегда пишет в Windows-1251 — декодируем сразу
    const text = new TextDecoder('windows-1251').decode(bytes);

    const lines = text.split(/\r?\n/);
    let dataLines = [];
    let updateTime = '';

    if (lines.length > 0 && lines[0].indexOf('Дата обновления') !== -1) {
      updateTime = lines[0];
      dataLines = lines.slice(1);
    } else {
      updateTime = 'Дата обновления: не указана';
      dataLines = lines;
    }

    goods = parse(dataLines.join('\n'));

    document.getElementById('upd').textContent = updateTime;
    render('');
  })
  .catch(error => {
    console.error("Ошибка загрузки:", error);
    document.getElementById('upd').textContent = '⚠ Не удалось загрузить ostatki.txt';
  });

function parse(text) {
  const lines = text.split(/\r?\n/);
  const result = [];

  for (let raw of lines) {
    if (!raw.trim()) continue;

    const cols = raw.split('\t');
    if (cols.length < 2) continue;
