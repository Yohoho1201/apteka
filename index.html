<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аптека Вита Ботаника — наличие товара</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  max-width: 800px; margin: 0 auto; padding: 16px;
  background: #f5f7fa; color: #222;
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.header img { height: 52px; width: auto; }
h1 { font-size: 20px; margin: 0; color: #1a7f37; }
.upd { color: #888; font-size: 13px; margin-bottom: 16px; }
#search {
  width: 100%; padding: 14px 16px; font-size: 17px;
  border: 2px solid #cfd8e3; border-radius: 10px; outline: none;
}
#search:focus { border-color: #2d7ff9; }
.count { color: #888; font-size: 13px; margin: 12px 2px; }
.item {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 12px 14px; margin-bottom: 8px;
  border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.name { flex: 1; padding-right: 12px; }
.qty { white-space: nowrap; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.in { background: #e3f7e8; color: #1a7f37; }
.out { background: #fdecec; color: #c0392b; }
.empty { text-align: center; color: #999; padding: 30px; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="logo" onerror="this.style.display='none'">
  <h1>Аптека «Вита Ботаника»</h1>
</div>
<div class="upd" id="upd">Загрузка данных…</div>

<input type="text" id="search" placeholder="🔍 Поиск товара…" oninput="render(this.value)">
<div class="count" id="count"></div>
<div id="list"></div>

<script>
let goods = [];

fetch('ostatki.txt?v=' + Date.now())
  .then(r => r.arrayBuffer())
  .then(buf => {
    const bytes = new Uint8Array(buf);
    // 1С v7.7 пишет в Windows-1251 — декодируем сразу
    const text = new TextDecoder('windows-1251').decode(bytes);

    goods = parse(text);

    // Ищем строку с датой обновления (если есть)
    let updateTime = 'Дата обновления: не указана';
    const lines = text.split(/\r?\n/);
    for (let l of lines) {
      if (l.indexOf('Дата обновления') !== -1) { updateTime = l.trim(); break; }
      if (l.indexOf('Остатки товаров') !== -1) { updateTime = l.trim(); break; }
    }

    document.getElementById('upd').textContent = updateTime;
    render('');
  })
  .catch(error => {
    console.error("Ошибка загрузки:", error);
    document.getElementById('upd').textContent = '⚠ Не удалось загрузить ostatki.txt';
  });

function parse(text) {
  const lines = text.split(/\r?\n/);
  const result = [];

  for (let raw of lines) {
    if (!raw.trim()) continue;

    // Все числа в строке (целые и дробные): 1, 2, 200, 0.5, 1.00000000
    const matches = raw.match(/-?\d+(?:\.\d+)?/g);
    if (!matches || matches.length === 0) continue;

    // Остаток — последнее число в строке
    const num = parseFloat(matches[matches.length - 1]);
    if (isNaN(num)) continue;

    // Название — всё до последнего числа
    const lastNum = matches[matches.length - 1];
    const cutPos = raw.lastIndexOf(lastNum);
    let name = raw.substring(0, cutPos).trim();

    // Если название пустое — пробуем взять всю строку без последнего числа иначе
    if (!name) continue;

    // Отбрасываем служебные строки
    if (name.indexOf('Остатки товаров') !== -1) continue;
    if (name.indexOf('по всем складам') !== -1) continue;
    if (name.indexOf('Итого') !== -1) continue;
    if (name === 'Товар' || name.indexOf('Товар /') === 0) continue;
    if (name.indexOf('Дата обновления') !== -1) continue;

    result.push({ name: name, qty: num });
  }
  return result;
}

// Форматирование количества: 0.5 → 0,5 ; 2 → 2
function fmt(n) {
  const r = Math.round(n * 10) / 10;
  return Number.isInteger(r) ? r.toString() : r.toString().replace('.', ',');
}

function render(query) {
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  query = (query || '').toLowerCase().trim();

  // Показываем только товары с остатком > 0
  let filtered = goods.filter(g => Math.round(g.qty * 10) / 10 > 0);

  if (query) {
    filtered = filtered.filter(g => g.name.toLowerCase().indexOf(query) !== -1);
  }

  count.textContent = 'Найдено: ' + filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }

  let html = '';
  for (let g of filtered) {
    html += '<div class="item">' +
              '<div class="name">' + escapeHtml(g.name) + '</div>' +
              '<div class="qty in">' + fmt(g.qty) + ' шт</div>' +
            '</div>';
  }
  list.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
}
</script>
</body>
</html>
