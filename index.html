<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аптека Вита Ботаника — наличие товара</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  max-width: 800px; margin: 0 auto; padding: 16px;
  background: #f5f7fa; color: #222;
}
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.header img { height: 52px; width: auto; }
h1 { font-size: 20px; margin: 0; color: #1a7f37; }
.upd { color: #888; font-size: 13px; margin-bottom: 16px; }
#search {
  width: 100%; padding: 14px 16px; font-size: 17px;
  border: 2px solid #cfd8e3; border-radius: 10px; outline: none;
}
#search:focus { border-color: #2d7ff9; }
.count { color: #888; font-size: 13px; margin: 12px 2px; }
.item {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; padding: 12px 14px; margin-bottom: 8px;
  border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.name { flex: 1; padding-right: 12px; }
.qty { white-space: nowrap; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.in { background: #e3f7e8; color: #1a7f37; }
.out { background: #fdecec; color: #c0392b; }
.empty { text-align: center; color: #999; padding: 30px; }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="logo" onerror="this.style.display='none'">
  <h1>Аптека «Вита Ботаника»</h1>
</div>
<div class="upd" id="upd">Загрузка данных…</div>

<input type="text" id="search" placeholder="🔍 Поиск товара…" oninput="render(this.value)">
<div class="count" id="count"></div>
<div id="list"></div>

<script>
let goods = [];

fetch('ostatki.txt?v=' + Date.now())
  .then(r => r.text()) // Меняем с .arrayBuffer() на .text()
  .then(text => {
    // Теперь text уже будет содержать строку в правильной кодировке,
    // если файл на сервере сохранен в UTF-8.
    // Если все равно кракозябры, то проблема точно в кодировке файла.

    const lines = text.split(/\r?\n/);
    let dataLines = [];
    let updateTime = '';

    // Проверяем, начинается ли первая строка с "Дата обновления:"
    // и если она содержит "кракозябры", пробуем ее исправить.
    if (lines.length > 0) {
      let firstLine = lines[0];
      // Попытка исправить возможные кракозябры в первой строке
      // Проверяем на наличие типичных "кракозябр"
      if (firstLine.includes('') || firstLine.includes('') || firstLine.includes('') || firstLine.includes('')) {
         try {
           // Если есть подозрение на Windows-1251, пробуем декодировать
           const bytes = new TextEncoder().encode(firstLine); // Кодируем текущую строку
           const correctedFirstLine = new TextDecoder('windows-1251').decode(bytes); // Декодируем как windows-1251

           // Проверяем, начинается ли исправленная строка с "Дата обновления:"
           if (correctedFirstLine.startsWith('Дата обновления:')) {
             firstLine = correctedFirstLine; // Используем исправленную строку
           }
         } catch (e) {
           // Ошибка при попытке исправить, оставляем как есть.
           // В консоли браузера (F12 -> Console) можно увидеть ошибку, если она будет.
         }
      }

      // Теперь проверяем, начинается ли (возможно, исправленная) первая строка с "Дата обновления:"
      if (firstLine.startsWith('Дата обновления:')) {
        updateTime = firstLine;
        dataLines = lines.slice(1); // Берем все строки, кроме первой, для данных товаров
        // Дополнительная проверка на всякий случай, если кракозябры остались
        if (updateTime.includes('') || updateTime.includes('')) {
          updateTime = 'Дата обновления: Ошибка кодировки';
        }
      } else {
        // Если первая строка не началась с "Дата обновления:", считаем, что это данные товаров
        updateTime = 'Дата обновления: Не найдена';
        dataLines = lines; // Используем все строки как данные товаров
      }
    } else {
      // Если файл пустой
      updateTime = 'Дата обновления: Файл пуст';
    }

    // Передаем данные товаров в функцию parse
    goods = parse(dataLines.join('\n'));

    // Отображаем время обновления (или сообщение об ошибке/отсутствии)
    document.getElementById('upd').textContent = updateTime;
    render(''); // Отображаем список товаров
  })
  .catch(error => {
    // Если произошла ошибка при загрузке файла
    console.error("Error fetching or processing data:", error); // Логируем ошибку для отладки
    document.getElementById('upd').textContent =
      '⚠ Не удалось загрузить ostatki.txt';
  });

function parse(text) {
  const lines = text.split(/\r?\n/);
  const result = [];

  for (let raw of lines) {
    if (!raw.trim()) continue;

    const cols = raw.split('\t');
    if (cols.length < 2) continue;

    const name = cols[0].trim();
    if (!name) continue;

    // Фильтры шапки/итогов
    if (name.indexOf('Остатки товаров') !== -1) continue;
    if (name.indexOf('По всем складам') !== -1) continue;
    if (name.indexOf('Карамзина') !== -1) continue;
    if (name.indexOf('Отдел') !== -1 && name.indexOf('Товар') !== -1) continue;
    if (name.indexOf('Итого') !== -1) continue;


    const lastCol = cols[cols.length - 1].trim();
    if (lastCol === '') continue;

    const num = parseFloat(lastCol.replace(',', '.'));
    if (isNaN(num)) continue;

    result.push({ name: name, qty: num });
  }
  return result;
}

function fmt(n) {
  return Number.isInteger(n) ? n.toString() : n.toString().replace('.', ',');
}

function render(query) {
  const q = (query || '').trim().toLowerCase();
  const list = document.getElementById('list');
  const count = document.getElementById('count');

  let filtered = goods.filter(g => g.qty > 0);
  if (q) filtered = filtered.filter(g => g.name.toLowerCase().indexOf(q) !== -1);

  count.textContent = 'Показано: ' + filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }

  let html = '';
  for (const g of filtered) {
    html += '<div class="item">' +
      '<span class="name">' + escapeHtml(g.name) + '</span>' +
      '<span class="qty in">' + fmt(g.qty) + ' шт</span>' +
      '</div>';
  }
  list.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>

</body>
</html>
